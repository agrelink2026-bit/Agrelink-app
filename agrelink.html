<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Agrelink — منصة الفلاح الرقمي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--g:#3a8c3f;--gd:#1e5c22;--gl:#6bbf4e;--b:#1a6fa8;--bd:#0d4a75;--bl:#3aa0d8;--bg:#f4f8f2;--text:#1a2e1a;--tl:#5a7a5a;--or:#e67e22;--gol:#f0a500;--red:#e74c3c;}
body{font-family:'Cairo',sans-serif;background:var(--bg);direction:rtl;min-height:100vh;}
.app{max-width:420px;margin:0 auto;min-height:100vh;background:var(--bg);box-shadow:0 0 40px rgba(0,0,0,.1);}
/* LANDING */
.land{min-height:100vh;display:flex;flex-direction:column;}
.land-hero{background:linear-gradient(160deg,var(--gd),var(--bd));padding:44px 24px 52px;text-align:center;color:#fff;position:relative;overflow:hidden;}
.land-hero::before{content:'';position:absolute;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.05);top:-80px;right:-80px;}
.llogo{width:130px;height:130px;border-radius:50%;background:#fff;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,.25);overflow:hidden;position:relative;z-index:1;}
.llogo img{width:100%;height:100%;object-fit:cover;}
.ltitle{font-size:30px;font-weight:900;margin-bottom:6px;position:relative;z-index:1;}
.lsub{font-size:13px;opacity:.85;position:relative;z-index:1;}
.lbadge{display:inline-block;background:rgba(255,255,255,.18);border-radius:20px;padding:5px 16px;font-size:11px;margin-top:12px;position:relative;z-index:1;}
.lbody{padding:22px 18px;flex:1;}
.lfeats{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:22px;}
.lfeat{background:#fff;border-radius:16px;padding:16px 12px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.05);border:1.5px solid #e8f5e9;}
.lstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:22px;}
.lstat{background:#fff;border-radius:12px;padding:12px 6px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.cta{background:linear-gradient(90deg,var(--gd),var(--b));color:#fff;border:none;border-radius:16px;padding:16px;width:100%;font-family:'Cairo',sans-serif;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 4px 20px rgba(58,140,63,.35);margin-bottom:10px;}
.cta2{width:100%;border:2px solid var(--g);background:transparent;color:var(--g);border-radius:16px;padding:13px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
/* AUTH */
.auth-wrap{min-height:100vh;background:linear-gradient(160deg,#e8f5e9,#e3f2fd);display:flex;flex-direction:column;}
.auth-card{background:#fff;border-radius:20px;padding:22px 20px;box-shadow:0 8px 32px rgba(0,0,0,.08);}
.rtabs{display:flex;gap:8px;margin-bottom:16px;}
.rtab{flex:1;padding:9px;border:2px solid #e0e0e0;border-radius:10px;background:#fff;color:var(--tl);font-family:'Cairo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}
.rtab.active{border-color:var(--g);color:var(--g);background:rgba(58,140,63,.06);}
.ig{margin-bottom:13px;}
.ig label{display:block;font-size:12px;font-weight:700;color:var(--tl);margin-bottom:5px;}
.ig input,.ig select,.ig textarea{width:100%;padding:12px 14px;border-radius:12px;border:2px solid #e0e0e0;font-size:13px;font-family:'Cairo',sans-serif;outline:none;transition:border .2s;background:#fff;}
.ig input:focus,.ig select:focus,.ig textarea:focus{border-color:var(--g);}
.ig input.err{border-color:var(--red);}
.emsg{color:var(--red);font-size:11px;margin-top:4px;}
.bp{width:100%;padding:14px;background:linear-gradient(90deg,var(--gd),var(--b));color:#fff;border:none;border-radius:12px;font-weight:900;font-size:15px;font-family:'Cairo',sans-serif;cursor:pointer;margin-bottom:10px;}
/* HEADER */
.header{background:linear-gradient(135deg,var(--gd),var(--bd));padding:11px 15px 13px;display:flex;align-items:center;gap:10px;}
.hlogo{width:46px;height:46px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.hlogo img{width:100%;height:100%;object-fit:cover;}
.htitle{color:#fff;font-weight:900;font-size:16px;line-height:1.1;}
.hsub{color:rgba(255,255,255,.75);font-size:10px;}
.hacts{margin-right:auto;display:flex;gap:6px;align-items:center;}
.hbtn{background:rgba(255,255,255,.15);border:none;border-radius:10px;color:#fff;font-size:11px;font-weight:700;padding:5px 9px;cursor:pointer;font-family:'Cairo',sans-serif;}
/* NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#fff;border-top:1.5px solid #e8f5e9;display:flex;padding:5px 0 8px;box-shadow:0 -4px 20px rgba(0,0,0,.06);z-index:100;}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;cursor:pointer;padding:3px 0;}
.nbtn .ni{font-size:19px;}
.nbtn .nl{font-size:9px;font-weight:500;color:var(--tl);font-family:'Cairo',sans-serif;}
.nbtn.active .nl{font-weight:800;color:var(--g);}
.ndot{width:18px;height:3px;background:var(--g);border-radius:2px;margin-top:1px;}
/* COMMON */
.sp{padding:0 15px 15px;}
.card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.04);}
.hero{background:linear-gradient(135deg,var(--gd),var(--b));border-radius:20px;padding:18px 16px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.tabs{display:flex;gap:8px;margin-bottom:14px;}
.tbtn{flex:1;padding:9px 0;border:none;border-radius:12px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:11px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.tbtn.active{background:var(--g);color:#fff;}
.tbtn:not(.active){background:#fff;color:var(--tl);}
.ptitle{padding:11px 15px 7px;display:flex;align-items:center;gap:8px;}
.pbar{width:4px;height:20px;background:var(--g);border-radius:4px;}
.ptxt{font-weight:900;font-size:15px;color:var(--gd);}
.content{flex:1;overflow-y:auto;padding-bottom:75px;}
/* COMPANY BANNER */
.company-banner{border-radius:14px;overflow:hidden;margin:0 15px 14px;position:relative;cursor:pointer;}
.banner-slide{display:none;}
.banner-slide.active{display:block;}
.banner-img{width:100%;height:90px;object-fit:cover;border-radius:14px;}
.banner-content{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.6),transparent);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;justify-content:center;}
.banner-dots{display:flex;justify-content:center;gap:5px;margin-top:6px;}
.bdot{width:6px;height:6px;border-radius:50%;background:#ccc;cursor:pointer;}
.bdot.active{background:var(--g);width:16px;border-radius:3px;}
/* MARKET / ADS */
.ad-card{background:#fff;border-radius:16px;padding:14px 15px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.04);border:1.5px solid #e8f5e9;}
.ad-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;}
/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 130px);}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 15px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:78%;padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.55;}
.msg.mine{align-self:flex-start;background:linear-gradient(135deg,var(--g),var(--b));color:#fff;border-bottom-left-radius:4px;}
.msg.theirs{align-self:flex-end;background:#fff;color:var(--text);border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.msg-time{font-size:9px;opacity:.7;margin-top:4px;}
.chat-input{padding:10px 15px;background:#fff;border-top:1.5px solid #e8f5e9;display:flex;gap:8px;align-items:flex-end;}
.chat-input textarea{flex:1;border:1.5px solid #e0e0e0;border-radius:14px;padding:10px 13px;font-size:13px;font-family:'Cairo',sans-serif;direction:rtl;resize:none;outline:none;max-height:100px;line-height:1.5;}
.chat-input textarea:focus{border-color:var(--g);}
.send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--b));border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
/* HELP */
.faq-item{background:#fff;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.faq-q{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:700;font-size:13px;color:var(--text);}
.faq-a{padding:0 16px 14px;font-size:12px;color:var(--tl);line-height:1.7;display:none;}
.faq-a.open{display:block;}
/* WEATHER */
.wcard{background:linear-gradient(135deg,#1565c0,#0288d1);border-radius:18px;padding:18px;color:#fff;text-align:center;margin-bottom:14px;}
.fscroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.fitem{background:#fff;border-radius:14px;padding:11px 13px;min-width:70px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1.5px solid #e0e0e0;flex-shrink:0;}
.fitem.today{background:linear-gradient(135deg,var(--b),var(--bd));color:#fff;border:none;}
/* MAP */
.map-area{background:linear-gradient(135deg,#e8f5e9,#e3f2fd);border-radius:12px;height:150px;position:relative;border:1.5px solid #b2dfdb;}
.mpin{position:absolute;transform:translate(-50%,-50%);text-align:center;}
.mdot{width:13px;height:13px;border-radius:50%;border:2.5px solid #fff;margin:0 auto 3px;}
/* PLANS */
.plan-card{border-radius:16px;padding:14px 16px;margin-bottom:12px;border:2px solid transparent;}
/* ADMIN */
.astat{flex:1;background:rgba(255,255,255,.12);border-radius:10px;padding:8px 6px;text-align:center;}
.receipt-img{width:100%;border-radius:10px;margin-top:8px;max-height:200px;object-fit:contain;border:1px solid #eee;}
/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fadeIn .3s ease;}
@keyframes drawerUp{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
#more-drawer[style*="flex"]{animation:drawerUp .25s ease;}
.more-btn:hover{background:var(--g)!important;color:#fff!important;}
.nbtn:active{transform:scale(.93);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px;}
/* DARK MODE */
[data-theme="dark"]{--bg:#0f1a0f;--text:#e8f5e8;--tl:#8aaa8a;--g:#4caf50;--gd:#2e7d32;--b:#2196f3;--bd:#1565c0;--or:#ff9800;--gol:#ffc107;--red:#f44336;}
[data-theme="dark"] .card,[data-theme="dark"] .ad-card,[data-theme="dark"] .vet-card,[data-theme="dark"] .auth-card,[data-theme="dark"] .faq-item{background:#1a2e1a!important;color:#e8f5e8;}
[data-theme="dark"] .bnav{background:#111;border-color:#2a3a2a;}
[data-theme="dark"] .header{background:linear-gradient(135deg,#0a1f0a,#0d2b4a)!important;}
[data-theme="dark"] body{background:#0f1a0f;}
[data-theme="dark"] .app{background:#0f1a0f;}
[data-theme="dark"] .ig input,[data-theme="dark"] .ig select,[data-theme="dark"] .ig textarea{background:#1a2e1a;color:#e8f5e8;border-color:#2a3a2a;}
[data-theme="dark"] .tbtn:not(.active){background:#1a2e1a;color:#8aaa8a;}
[data-theme="dark"] #more-drawer{background:#111;border-color:#2a3a2a;}
[data-theme="dark"] .more-btn:not([style*="var(--g)"]){background:#1a2e1a!important;color:#e8f5e8!important;}
[data-theme="dark"] .phone-display{background:#1a2e1a;border-color:#2a3a2a;}
/* RESPONSIVE < 360px */
@media(max-width:359px){
  body{font-size:13px;}
  .htitle{font-size:13px;}
  .hbtn{font-size:10px;padding:4px 7px;}
  .ni{font-size:16px;}
  .nl{font-size:8px;}
  .ndot{width:14px;}
  .ad-card,.card{padding:10px 12px;}
  .sp{padding:0 10px 10px;}
  .g2{grid-template-columns:1fr;}
  .bp{font-size:13px;padding:11px;}
  .otp-box{width:44px;height:52px;font-size:18px;}
}
* {-webkit-font-smoothing:antialiased;}
.card,.ad-card,.vet-card{will-change:transform;contain:content;}
.vet-card{background:#fff;border-radius:15px;padding:14px 15px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.04);border:1.5px solid rgba(123,45,139,.2);}
</style>

  login(phone){return this.users.find(u=>u.phone===phone.trim())||null;},
  register(name,phone,zone,role){
    if(this.users.find(u=>u.phone===phone))return null;
    const u={id:Date.now(),name,phone,role,zone,status:"قيد الانتظار",createdAt:new Date().toISOString()};
    this.users.push(u);return u;
  },
  getExperts(){return this.users.filter(u=>u.role==="خبير"&&u.status==="نشط");},
  getVets(){return this.users.filter(u=>u.role==="بيطري"&&u.status==="نشط");},
  getOrCreateChat(chatKey){
    if(!this.chats[chatKey])this.chats[chatKey]=[];
    return this.chats[chatKey];
  },
  sendMsg(chatKey,msg){
    if(!this.chats[chatKey])this.chats[chatKey]=[];
    this.chats[chatKey].push(msg);
  },
  getConsultation(farmerId,expertId){
    return this.consultations.find(c=>c.farmerId===farmerId&&c.expertId===expertId);
  },
  startConsultation(farmer,expert,topic){
    const existing=this.getConsultation(farmer.id,expert.id);
    if(existing)return existing;
    const c={id:Date.now(),farmerId:farmer.id,farmerName:farmer.name,farmerPhone:farmer.phone,
      expertId:expert.id,expertName:expert.name,topic,status:"نشط",createdAt:new Date().toISOString()};
    this.consultations.push(c);
    return c;
  },
  addFarmerAd(ad){this.farmerAds.unshift({id:Date.now(),...ad,createdAt:new Date().toISOString(),status:"نشط"});},
  addCompanyRequest(req){this.companyRequests.push({id:Date.now(),...req,status:"قيد المراجعة",createdAt:new Date().toISOString()});},
  addPost(p){this.posts.unshift({id:Date.now(),...p,likes:[],comments:[],createdAt:new Date().toISOString()});},
  toggleLike(postId,userId){const p=this.posts.find(x=>x.id===postId);if(!p)return;const idx=p.likes.indexOf(userId);if(idx>-1)p.likes.splice(idx,1);else p.likes.push(userId);},
  addComment(postId,comment){const p=this.posts.find(x=>x.id===postId);if(p)p.comments.push(comment);},
  addOrder(o){this.orders.push({id:Date.now(),...o,status:"قيد الانتظار",createdAt:new Date().toISOString()});},
  updateOrderStatus(id,status){const o=this.orders.find(x=>x.id===id);if(o)o.status=status;},
  addHelpTicket(t){this.helpTickets.push({id:Date.now(),...t,status:"مفتوح",createdAt:new Date().toISOString()});},
  updatePrice(id,min,max){const p=this.products.find(p=>p.id===id);if(p){p.minPrice=min;p.maxPrice=max;p.updatedAt=new Date().toISOString();p.updatedBy="المسؤول";}return p;},
  updateUserStatus(id,s){const u=this.users.find(u=>u.id===id);if(u)u.status=s;},
  updateConsultationStatus(id,s){const c=this.consultations.find(c=>c.id===id);if(c)c.status=s;},
  approveCompanyAd(id){const r=this.companyRequests.find(r=>r.id===id);if(r){this.companyAds.push({id:Date.now(),company:r.company,slogan:r.slogan,color:"#1e5c22",bg:"linear-gradient(135deg,#1e5c22,#3a8c3f)",phone:r.phone,status:"نشط"});r.status="موافق عليه";}},
  getCurrentSub(phone){return this.subscriptions.find(s=>s.userPhone===phone)||{plan:"free",status:"active"};},
  submitSub(data){const ex=this.subscriptions.find(s=>s.userPhone===data.userPhone);if(ex){Object.assign(ex,data,{status:"pending_verification",updatedAt:new Date().toISOString()});}else this.subscriptions.push({id:Date.now(),...data,status:"pending_verification",adminNote:"",updatedAt:new Date().toISOString()});},
  verifySub(id,status,note){const s=this.subscriptions.find(s=>s.id===id);if(s){s.status=status;s.adminNote=note;s.updatedAt=new Date().toISOString();}},
};

function bindAuth(){
  document.getElementById("tab-reg")?.addEventListener("click",()=>{S.authMode="register";render();});
  document.getElementById("tab-login")?.addEventListener("click",()=>{S.authMode="login";render();});
  document.getElementById("back-land")?.addEventListener("click",()=>{S.view="landing";render();});
  let selRole="فلاح";
  document.querySelectorAll(".rsel").forEach(b=>{
    b.addEventListener("click",()=>{
      selRole=b.dataset.role;
      document.querySelectorAll(".rsel").forEach(x=>{x.style.borderColor="#e0e0e0";x.style.color="var(--tl)";x.style.background="#fff";});
      b.style.borderColor="var(--g)";b.style.color="var(--g)";b.style.background="rgba(58,140,63,.07)";
    });
  });
  // Avatar preview
  let avatarData=null;
  document.getElementById("avatar-input")?.addEventListener("change",e=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>3*1024*1024){alert("الصورة يجب أن تكون أقل من 3 ميغا");return;}
    const r=new FileReader();
    r.onload=ev=>{
      avatarData=ev.target.result;
      const prev=document.getElementById("avatar-preview");
      if(prev){prev.innerHTML=`<img src="${avatarData}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;}
    };r.readAsDataURL(f);
  });

  document.getElementById("do-reg")?.addEventListener("click",()=>{
    const name=document.getElementById("rname")?.value.trim();
    const phone=document.getElementById("rphone")?.value.trim();
    const nid=document.getElementById("rnid")?.value.trim();
    const zone=document.getElementById("rzone")?.value;
    const crops=document.getElementById("rcrops")?.value.trim()||"";
    const area=document.getElementById("rarea")?.value.trim()||"";
    const regnum=document.getElementById("rreg")?.value.trim()||"";
    const err=document.getElementById("rerr");
    if(!name){err.textContent="⚠️ أدخل اسمك الكامل";err.style.display="block";return;}
    if(!phone||phone.length<9){err.textContent="⚠️ أدخل رقم هاتف صحيح";err.style.display="block";return;}
    if(!/^0[5-7]\d{8}$/.test(phone)){err.textContent="⚠️ رقم الهاتف غير صحيح — يجب أن يبدأ بـ 05، 06 أو 07";err.style.display="block";return;}
    if(!nid||nid.length<9){err.textContent="⚠️ أدخل رقم الهوية الوطنية";err.style.display="block";return;}
    if(!zone){err.textContent="⚠️ اختر منطقتك";err.style.display="block";return;}
    const u=DB.register(name,phone,zone,selRole);
    if(!u){err.textContent="⚠️ رقم الهاتف مسجل مسبقاً";err.style.display="block";return;}
    u.crops=crops;u.area=area;u.regnum=regnum;u.nid=nid;u.avatar=avatarData;
    S.currentUser=u;S.view="app";render();
  });
  document.getElementById("do-login")?.addEventListener("click",()=>{
    const phone=document.getElementById("lphone")?.value.trim();
    const err=document.getElementById("lerr");
    if(!phone){err.textContent="⚠️ أدخل رقم الهاتف";err.style.display="block";return;}
    const u=DB.login(phone);
    if(!u){err.textContent="⚠️ رقم الهاتف غير مسجل";err.style.display="block";return;}
    S.currentUser=u;S.view="app";render();
  });
  document.getElementById("lphone")?.addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("do-login")?.click();});
}

function bindAds(){
  document.querySelectorAll(".ftbtn").forEach(b=>b.addEventListener("click",()=>{S.adTypeFilter=b.dataset.t;render();}));
  document.getElementById("add-farmer-ad")?.addEventListener("click",()=>{S.showAddAd=true;render();bindAds();});
  document.getElementById("add-company-ad")?.addEventListener("click",()=>{S.companyFormMode=true;render();bindAds();});
  document.getElementById("back-ads")?.addEventListener("click",()=>{S.showAddAd=false;S.companyFormMode=false;render();});

  // Add farmer ad form
  let selType="بيع";let selEmoji="🥔";
  document.querySelectorAll(".ad-type-btn").forEach(b=>{
    b.addEventListener("click",()=>{
      selType=b.dataset.type;
      document.querySelectorAll(".ad-type-btn").forEach(x=>{x.style.borderColor="#e0e0e0";x.style.color="var(--tl)";x.style.background="#fff";});
      b.style.borderColor=selType==="بيع"?"var(--g)":"var(--b)";b.style.color=selType==="بيع"?"var(--g)":"var(--b)";b.style.background=selType==="بيع"?"rgba(58,140,63,.07)":"rgba(26,111,168,.07)";
    });
  });
  document.querySelectorAll(".emoji-btn").forEach(b=>{
    b.addEventListener("click",()=>{
      selEmoji=b.dataset.e;
      document.querySelectorAll(".emoji-btn").forEach(x=>{x.style.borderColor="#e0e0e0";x.style.background="#fff";});
      b.style.borderColor="var(--g)";b.style.background="rgba(58,140,63,.1)";
    });
  });
  document.getElementById("submit-ad")?.addEventListener("click",()=>{
    const title=document.getElementById("ad-title")?.value.trim();
    const desc=document.getElementById("ad-desc")?.value.trim();
    const price=document.getElementById("ad-price")?.value.trim();
    const qty=document.getElementById("ad-qty")?.value.trim();
    const err=document.getElementById("ad-err");
    if(!title){err.textContent="⚠️ أدخل عنوان الإعلان";err.style.display="block";return;}
    if(!desc){err.textContent="⚠️ أدخل وصف الإعلان";err.style.display="block";return;}
    if(!price){err.textContent="⚠️ أدخل السعر";err.style.display="block";return;}
    DB.addFarmerAd({userId:S.currentUser.id,userName:S.currentUser.name,type:selType,title,desc,price,qty,zone:S.currentUser.zone||"عين الدفلى",phone:S.currentUser.phone,emoji:selEmoji});
    S.showAddAd=false;render();
  });

  // Company form
  // Send order from ad
  document.querySelectorAll(".send-order-btn").forEach(b=>b.addEventListener("click",()=>{
    if(b.dataset.sellerid==S.currentUser.id){alert("لا يمكنك طلب إعلانك الخاص");return;}
    const qty=prompt("كم الكمية التي تريدها؟","100 كغ");
    if(!qty)return;
    const note=prompt("ملاحظة للبائع (اختياري):","");
    DB.addOrder({
      adId:+b.dataset.adid,adTitle:b.dataset.adtitle,
      sellerId:+b.dataset.sellerid,sellerName:b.dataset.sellername,sellerPhone:b.dataset.sellerphone,
      buyerId:S.currentUser.id,buyerName:S.currentUser.name,buyerPhone:S.currentUser.phone,
      qty,price:b.dataset.price,note:note||""
    });
    alert("✅ تم إرسال طلبك للبائع! تحقق من قسم طلباتي لمتابعة الحالة.");
  }));

  document.getElementById("submit-company")?.addEventListener("click",()=>{
    const company=document.getElementById("c-name")?.value.trim();
    const slogan=document.getElementById("c-slogan")?.value.trim();
    const phone=document.getElementById("c-phone")?.value.trim();
    const sector=document.getElementById("c-sector")?.value;
    const err=document.getElementById("c-err");
    if(!company){err.textContent="⚠️ أدخل اسم الشركة";err.style.display="block";return;}
    if(!slogan){err.textContent="⚠️ أدخل شعار الإعلان";err.style.display="block";return;}
    if(!phone){err.textContent="⚠️ أدخل رقم الهاتف";err.style.display="block";return;}
    if(!sector){err.textContent="⚠️ اختر مجال النشاط";err.style.display="block";return;}
    DB.addCompanyRequest({company,slogan,phone,sector,msg:document.getElementById("c-msg")?.value.trim()||"",requesterName:S.currentUser.name,requesterPhone:S.currentUser.phone});
    S.companyFormMode=false;
    alert("✅ تم إرسال طلبك! سيتواصل معك المسؤول قريباً.");
    render();
  });
}

function renderAdvice(){
  if(S.currentUser?.isGuest) return `<div class="sp">${guestBlock("الاستشارة الزراعية")}</div>`;

  const experts=DB.getExperts();

  return `
  <div class="sp">
    <div class="hero" style="background:linear-gradient(135deg,var(--gd),#1e7c3f);padding:16px 18px;margin-bottom:14px">

          <div style="flex:1">
            <div style="font-weight:800;font-size:13px">${otherName}</div>
            <div style="font-size:11px;color:var(--tl)">${c.topic}</div>

    ${experts.map(e=>`

          <div style="background:var(--g);color:#fff;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700;height:fit-content">● متاح</div>

function renderChat(){
  const c=S.activeChat;
  const chatKey=S.activeChatKey;
  const msgs=DB.getOrCreateChat(chatKey);
  const isMe=m=>m.senderId===S.currentUser.id;
  const fmt=iso=>{const d=new Date(iso);return d.toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"});};
  const otherName=c.farmerId===S.currentUser.id?c.expertName:c.farmerName;

  return `
  <div style="display:flex;flex-direction:column;height:calc(100vh - 128px)">
    <!-- Chat header -->
    <div style="background:#fff;padding:12px 15px;border-bottom:1.5px solid #e8f5e9;display:flex;align-items:center;gap:10px">
      <button id="back-chat" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--b);padding:0">←</button>
      <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--b));display:flex;align-items:center;justify-content:center;font-size:18px">👨‍🔬</div>
      <div>
        <div style="font-weight:800;font-size:13px">${otherName}</div>
        <div style="font-size:10px;color:var(--tl)">${c.topic}</div>
      </div>
    </div>
    <!-- Messages -->
    <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:12px 15px;display:flex;flex-direction:column;gap:10px;background:#f4f8f2">
      ${msgs.length===0?`<div style="text-align:center;color:var(--tl);font-size:12px;margin:auto;padding:20px">ابدأ المحادثة مع الخبير 👋</div>`:""}
      ${msgs.map(m=>`
        <div style="display:flex;flex-direction:column;align-items:${isMe(m)?"flex-start":"flex-end"}">
          <div style="max-width:78%;padding:10px 13px;border-radius:${isMe(m)?"16px 16px 16px 4px":"16px 16px 4px 16px"};font-size:13px;line-height:1.55;background:${isMe(m)?"linear-gradient(135deg,var(--g),var(--b))":"#fff"};color:${isMe(m)?"#fff":"var(--text)"};box-shadow:${isMe(m)?"none":"0 2px 8px rgba(0,0,0,.06)"}">
            ${m.text}
          </div>
          <div style="font-size:9px;color:#bbb;margin-top:3px">${fmt(m.time)}</div>
        </div>`).join("")}

function bindAdvice(){
  // Open existing chats
  DB.consultations.forEach(c=>{
    document.getElementById(`open-chat-${c.id}`)?.addEventListener("click",()=>{
      S.activeChat=c;
      S.activeChatKey=`chat_${Math.min(c.farmerId,c.expertId)}_${Math.max(c.farmerId,c.expertId)}`;
      render();bindAdvice();
    });
  });

  // Start new consultation
  document.querySelectorAll(".start-chat-btn").forEach(b=>{
    b.addEventListener("click",()=>{
      const expertId=+b.dataset.expertid;
      const expertName=b.dataset.expertname;
      const expert=DB.users.find(u=>u.id===expertId);
      if(!expert)return;
      const topic=prompt("موضوع الاستشارة:","مشكلة في المحصول");
      if(!topic)return;
      const c=DB.startConsultation(S.currentUser,expert,topic);
      S.activeChat=c;
      S.activeChatKey=`chat_${Math.min(c.farmerId,c.expertId)}_${Math.max(c.farmerId,c.expertId)}`;
      render();bindAdvice();
    });
  });

  // Chat binding
  document.getElementById("back-chat")?.addEventListener("click",()=>{S.activeChat=null;S.activeChatKey=null;render();});

  const scrollDown=()=>{const el=document.getElementById("chat-msgs");if(el)el.scrollTop=el.scrollHeight;};
  scrollDown();

  const sendMsg=()=>{
    const inp=document.getElementById("chat-input");
    const text=inp?.value.trim();
    if(!text||!S.activeChatKey)return;
    DB.sendMsg(S.activeChatKey,{id:Date.now(),senderId:S.currentUser.id,senderName:S.currentUser.name,text,time:new Date().toISOString()});
    inp.value="";
    // Re-render messages only
    const c=S.activeChat;
    const msgs=DB.getOrCreateChat(S.activeChatKey);
    const isMe=m=>m.senderId===S.currentUser.id;
    const fmt=iso=>new Date(iso).toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"});
    const msgsEl=document.getElementById("chat-msgs");
    if(msgsEl){
      msgsEl.innerHTML=msgs.map(m=>`
        <div style="display:flex;flex-direction:column;align-items:${isMe(m)?"flex-start":"flex-end"}">
          <div style="max-width:78%;padding:10px 13px;border-radius:${isMe(m)?"16px 16px 16px 4px":"16px 16px 4px 16px"};font-size:13px;line-height:1.55;background:${isMe(m)?"linear-gradient(135deg,var(--g),var(--b))":"#fff"};color:${isMe(m)?"#fff":"var(--text)"};box-shadow:${isMe(m)?"none":"0 2px 8px rgba(0,0,0,.06)"}">${m.text}</div>
          <div style="font-size:9px;color:#bbb;margin-top:3px">${fmt(m.time)}</div>
        </div>`).join("");
      setTimeout(scrollDown,50);
    }
    // Simulate expert reply
    if(S.currentUser.id!==S.activeChat.expertId){
      setTimeout(()=>{
        const replies=["شكراً على سؤالك، سأنظر في الأمر فوراً.","هل يمكنك إرسال صورة للمشكلة؟","هذا شائع في هذا الموسم، إليك الحل...","انتظر قليلاً سأعطيك إجابة مفصّلة."];
        const reply=replies[Math.floor(Math.random()*replies.length)];
        DB.sendMsg(S.activeChatKey,{id:Date.now(),senderId:S.activeChat.expertId,senderName:S.activeChat.expertName,text:reply,time:new Date().toISOString()});
        const msgs2=DB.getOrCreateChat(S.activeChatKey);
        const msgsEl2=document.getElementById("chat-msgs");
        if(msgsEl2){
          msgsEl2.innerHTML=msgs2.map(m=>`
            <div style="display:flex;flex-direction:column;align-items:${isMe(m)?"flex-start":"flex-end"}">
              <div style="max-width:78%;padding:10px 13px;border-radius:${isMe(m)?"16px 16px 16px 4px":"16px 16px 4px 16px"};font-size:13px;line-height:1.55;background:${isMe(m)?"linear-gradient(135deg,var(--g),var(--b))":"#fff"};color:${isMe(m)?"#fff":"var(--text)"};box-shadow:${isMe(m)?"none":"0 2px 8px rgba(0,0,0,.06)"}">${m.text}</div>
              <div style="font-size:9px;color:#bbb;margin-top:3px">${fmt(m.time)}</div>
            </div>`).join("");
          setTimeout(scrollDown,50);
        }
      },1500+Math.random()*1500);
    }
  };

  document.getElementById("send-msg")?.addEventListener("click",sendMsg);
  document.getElementById("chat-input")?.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}});
}

function bindVets(){
  // Open existing vet chats
  document.querySelectorAll("[data-vcid]").forEach(el=>{
    el.addEventListener("click",()=>{
      const c=DB.consultations.find(x=>x.id===+el.dataset.vcid);
      if(c){S.activeVetChat=c;render();bindVets();}
    });
  });

  // Start new vet chat
  document.querySelectorAll(".start-vet-btn").forEach(b=>{
    b.addEventListener("click",()=>{
      const vet=DB.users.find(u=>u.id===+b.dataset.vid);
      if(!vet)return;
      const topic=prompt("موضوع الاستشارة البيطرية:","مرض في الماشية");
      if(!topic)return;
      const chatKey=`vet_${Math.min(S.currentUser.id,vet.id)}_${Math.max(S.currentUser.id,vet.id)}`;
      const existing=DB.consultations.find(c=>c.chatKey===chatKey);
      let c;
      if(existing){c=existing;}
      else{
        c={id:Date.now(),type:"vet",idA:S.currentUser.id,nameA:S.currentUser.name,phoneA:S.currentUser.phone,idB:vet.id,nameB:vet.name,phoneB:vet.phone,topic,chatKey,createdAt:new Date().toISOString()};
        DB.consultations.push(c);
      }
      S.activeVetChat=c;render();bindVets();
    });
  });

  // Back from chat
  document.getElementById("back-vet-chat")?.addEventListener("click",()=>{S.activeVetChat=null;render();});

  // Scroll to bottom
  const scrollDown=()=>{const el=document.getElementById("vet-msgs");if(el)el.scrollTop=el.scrollHeight;};
  setTimeout(scrollDown,50);

  // Image preview
  let pendingImg=null;let pendingCaption="";
  document.getElementById("vet-img-input")?.addEventListener("change",e=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>8*1024*1024){alert("الصورة يجب أن تكون أقل من 8 ميغا");return;}
    const r=new FileReader();
    r.onload=ev=>{
      pendingImg=ev.target.result;
      const prev=document.getElementById("img-preview");
      const wrap=document.getElementById("img-preview-wrap");
      if(prev){prev.src=pendingImg;}
      if(wrap){wrap.style.display="block";}
    };r.readAsDataURL(f);
  });
  document.getElementById("cancel-img")?.addEventListener("click",()=>{
    pendingImg=null;
    const wrap=document.getElementById("img-preview-wrap");
    if(wrap){wrap.style.display="none";}
    const inp=document.getElementById("vet-img-input");
    if(inp)inp.value="";
  });

  const sendVetMsg=()=>{
    const inp=document.getElementById("vet-chat-input");
    const text=(inp?.value||"").trim();
    const chatKey=S.activeVetChat.chatKey;
    if(!pendingImg&&!text)return;

    if(pendingImg){
      const caption=document.getElementById("img-caption")?.value.trim()||"";
      DB.sendMsg(chatKey,{id:Date.now(),senderId:S.currentUser.id,type:"img",imgData:pendingImg,caption,time:new Date().toISOString()});
      pendingImg=null;
      const wrap=document.getElementById("img-preview-wrap");
      if(wrap)wrap.style.display="none";
      const imgInp=document.getElementById("vet-img-input");
      if(imgInp)imgInp.value="";
    }
    if(text){
      DB.sendMsg(chatKey,{id:Date.now(),senderId:S.currentUser.id,type:"text",text,time:new Date().toISOString()});
      if(inp)inp.value="";
    }

    // Re-render messages
    refreshVetMsgs(chatKey);

    // Auto-reply from vet
    setTimeout(()=>{
      const replies=typeof VET_REPLIES!=="undefined"?VET_REPLIES:["شكراً، سأرد قريباً."];
      const reply=replies[Math.floor(Math.random()*replies.length)];
      DB.sendMsg(chatKey,{id:Date.now(),senderId:S.activeVetChat.idB,type:"text",text:reply,time:new Date().toISOString()});
      refreshVetMsgs(chatKey);
    },1200+Math.random()*1800);
  };

  function refreshVetMsgs(chatKey){
    const msgs=DB.getOrCreateChat(chatKey);
    const isMe=m=>m.senderId===S.currentUser.id;
    const fmt=iso=>new Date(iso).toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"});
    const el=document.getElementById("vet-msgs");
    if(!el)return;
    el.innerHTML=msgs.map(m=>`
      <div style="display:flex;flex-direction:column;align-items:${isMe(m)?"flex-start":"flex-end"}">
        ${m.type==="img"?`
          <div style="max-width:78%;border-radius:${isMe(m)?"14px 14px 14px 4px":"14px 14px 4px 14px"};overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)">
            <img src="${m.imgData}" style="width:100%;max-width:220px;display:block"/>
            ${m.caption?`<div style="padding:6px 10px;background:${isMe(m)?"linear-gradient(135deg,#5a0080,#7b2d8b)":"#fff"};color:${isMe(m)?"#fff":"var(--text)"};font-size:11px">${m.caption}</div>`:""}
          </div>
        `:`
          <div style="max-width:78%;padding:10px 13px;border-radius:${isMe(m)?"14px 14px 14px 4px":"14px 14px 4px 14px"};font-size:13px;line-height:1.55;background:${isMe(m)?"linear-gradient(135deg,#5a0080,#7b2d8b)":"#fff"};color:${isMe(m)?"#fff":"var(--text)"};box-shadow:${isMe(m)?"none":"0 2px 8px rgba(0,0,0,.06)"}">
            ${m.text}
          </div>
        `}
        <div style="font-size:9px;color:#bbb;margin-top:3px">${fmt(m.time)}</div>
      </div>`).join("");
    setTimeout(()=>{if(el)el.scrollTop=el.scrollHeight;},30);

    // Re-bind inputs after refresh
    document.getElementById("vet-img-input")?.addEventListener("change",()=>{});
  }

  document.getElementById("vet-send-btn")?.addEventListener("click",sendVetMsg);
  document.getElementById("vet-chat-input")?.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendVetMsg();}});
}

        <button id="remove-post-img" style="position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:13px">✕</button>
      </div>

          📷 إضافة صورة<input type="file" id="post-img-input" accept="image/*" style="display:none"/>
        </label>
        <button id="submit-post" style="flex:2;padding:10px;background:linear-gradient(90deg,var(--gd),var(--b));color:#fff;border:none;border-radius:10px;font-weight:900;font-size:14px;font-family:'Cairo',sans-serif;cursor:pointer">🌍 نشر</button>

function bindCommunity(){
  document.getElementById("add-post-btn")?.addEventListener("click",()=>{S.showAddPost=true;render();bindCommunity();});
  document.getElementById("back-post")?.addEventListener("click",()=>{S.showAddPost=false;render();});

  // Like buttons
  document.querySelectorAll(".like-btn").forEach(b=>b.addEventListener("click",()=>{
    DB.toggleLike(+b.dataset.pid,S.currentUser.id);render();bindCommunity();
  }));

  // Comment toggle
  document.querySelectorAll(".comment-toggle").forEach(b=>b.addEventListener("click",()=>{
    const box=document.querySelector(`.comment-box[data-pid="${b.dataset.pid}"]`);
    if(box){box.style.display=box.style.display==="none"?"block":"none";}
  }));

  // Send comment
  document.querySelectorAll(".send-comment").forEach(b=>b.addEventListener("click",()=>{
    const inp=document.querySelector(`.comment-input[data-pid="${b.dataset.pid}"]`);
    const text=inp?.value.trim();
    if(!text)return;
    DB.addComment(+b.dataset.pid,{userId:S.currentUser.id,userName:S.currentUser.name,text,time:new Date().toISOString()});
    render();bindCommunity();
  }));
  document.querySelectorAll(".comment-input").forEach(inp=>inp.addEventListener("keydown",e=>{
    if(e.key==="Enter"){document.querySelector(`.send-comment[data-pid="${inp.dataset.pid}"]`)?.click();}
  }));

  // Add post form
  let postImg=null;
  document.getElementById("post-img-input")?.addEventListener("change",e=>{
    const f=e.target.files[0];if(!f||f.size>8*1024*1024)return;
    const r=new FileReader();
    r.onload=ev=>{
      postImg=ev.target.result;
      document.getElementById("post-img-show").src=postImg;
      document.getElementById("post-img-preview").style.display="block";
    };r.readAsDataURL(f);
  });
  document.getElementById("remove-post-img")?.addEventListener("click",()=>{
    postImg=null;
    document.getElementById("post-img-preview").style.display="none";
    document.getElementById("post-img-input").value="";
  });
  document.getElementById("submit-post")?.addEventListener("click",()=>{
    const text=document.getElementById("post-text")?.value.trim();
    if(!text&&!postImg){alert("اكتب شيئاً أو أضف صورة");return;}
    DB.addPost({userId:S.currentUser.id,userName:S.currentUser.name,userZone:S.currentUser.zone||"عين الدفلى",userRole:S.currentUser.role,userAvatar:S.currentUser.avatar||null,text:text||"",imgData:postImg});
    S.showAddPost=false;render();
  });
}

function bindProfile(){
  document.getElementById("pt-info")?.addEventListener("click",()=>{S.profileTab="info";render();});
  document.getElementById("pt-sub")?.addEventListener("click",()=>{S.profileTab="sub";S.paymentSuccess=false;render();});
  document.querySelectorAll(".selplan").forEach(b=>b.addEventListener("click",()=>{const p=PLANS.find(x=>x.id===b.dataset.plan);if(p){S.selectedPlan=p;render();bindProfile();}}));
  document.getElementById("back-pay")?.addEventListener("click",()=>{S.selectedPlan=null;render();});
  document.querySelectorAll(".pm").forEach(el=>el.addEventListener("click",()=>{S.payMethod=el.dataset.mid;render();bindProfile();}));
  let fdata=null,fname=null;
  document.getElementById("rfile")?.addEventListener("change",e=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>5*1024*1024)return;
    fname=f.name;
    const r=new FileReader();
    r.onload=ev=>{
      fdata=ev.target.result;
      document.getElementById("fprev").innerHTML=`<img src="${fdata}" style="max-width:100%;max-height:180px;border-radius:8px;object-fit:contain"/><div style="font-size:11px;color:var(--g);margin-top:6px;font-weight:700">✅ ${f.name}</div>`;
      document.getElementById("flbl").style.borderColor="var(--g)";
      checkPayReady();
    };r.readAsDataURL(f);
  });
  const checkPayReady=()=>{
    if(fdata&&S.payMethod){const btn=document.getElementById("sub-pay");if(btn){btn.disabled=false;btn.style.background=`linear-gradient(90deg,${S.selectedPlan.color},var(--b))`;btn.style.cursor="pointer";}}
  };
  document.getElementById("sub-pay")?.addEventListener("click",()=>{
    if(!fdata||!S.payMethod)return;
    DB.submitSub({userName:S.currentUser.name,userPhone:S.currentUser.phone,plan:S.selectedPlan.id,receiptData:fdata,receiptFilename:fname,payMethod:S.payMethod});
    S.paymentSuccess=true;S.selectedPlan=null;S.profileTab="sub";render();
  });
}

// WEATHER — OpenWeatherMap
// ============================================================
async function fetchWeather(){
  const API_KEY = ""; // ← ضع مفتاحك هنا من openweathermap.org
  if(!API_KEY){ return; } // تخطى إن لم يوجد مفتاح
  const CITY = "Ain Defla,DZ";
  const URL = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(CITY)}&appid=${API_KEY}&units=metric&lang=ar`;
  try {
    const res = await fetch(URL);
    const data = await res.json();
    if(data.cod !== 200) return;
    const iconMap = {"01":"☀️","02":"⛅","03":"🌥","04":"☁️","09":"🌧","10":"🌦","11":"⛈","13":"❄️","50":"🌫"};
    const icon = iconMap[data.weather[0].icon.slice(0,2)] || "🌤";
    const temp = Math.round(data.main.temp);
    const feels = Math.round(data.main.feels_like);
    const humidity = data.main.humidity;
    const wind = Math.round(data.wind.speed * 3.6);
    const desc = data.weather[0].description;
    const setEl = (id, val) => { const el = document.getElementById(id); if(el) el.innerHTML = val; };
    setEl("weather-icon", icon);
    setEl("weather-temp", temp + "°");
    setEl("weather-desc", desc);
    setEl("weather-feels", feels + "°");
    setEl("weather-humidity", humidity + "%");
    setEl("weather-wind", wind + " كم/س");
  } catch(e){ console.warn("Weather API error:", e); }
}
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);

let vetMapInstance = null;
function initVetMap(){
  const mapEl = document.getElementById("vet-map");
  if(!mapEl || !window.L) return;
  if(vetMapInstance){ vetMapInstance.invalidateSize(); return; }
  const vetsData = DB.getVets().map((v,i)=>{
    // مواقع تقريبية لعين الدفلى ومحيطها
    const coords = [
      [36.2640, 1.9688],[36.2100, 1.9200],[36.3200, 2.0800],[36.1800, 1.8500],
      [36.2800, 2.1000],[36.1500, 2.0000]
    ];
    return {...v, lat: coords[i%coords.length][0], lng: coords[i%coords.length][1]};
  });
  vetMapInstance = L.map(mapEl, {zoomControl:true, scrollWheelZoom:false})
    .setView([36.26, 1.97], 10);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    attribution:"© OpenStreetMap", maxZoom:18
  }).addTo(vetMapInstance);
  const vetIcon = L.divIcon({
    html:`<div style="background:#7b2d8b;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">🩺</div>`,
    iconSize:[32,32], iconAnchor:[16,16], className:""
  });
  vetsData.forEach(v=>{
    L.marker([v.lat, v.lng], {icon: vetIcon}).addTo(vetMapInstance)
      .bindPopup(`<div style="font-family:'Cairo',sans-serif;direction:rtl;text-align:right;min-width:150px"><div style="font-weight:800;font-size:13px;margin-bottom:4px">${v.name}</div><div style="font-size:11px;color:#666;margin-bottom:4px">🔬 ${v.specialty||"طب بيطري"}</div><div style="font-size:11px;color:#666">📍 ${v.zone}</div><a href="tel:${v.phone}" style="display:block;margin-top:8px;background:#7b2d8b;color:#fff;padding:6px;border-radius:8px;text-align:center;text-decoration:none;font-size:12px;font-weight:700">📞 ${v.phone}</a></div>`);
  });
  setTimeout(()=>vetMapInstance.invalidateSize(), 300);
}

function validatePhone(phone){
  return /^0[5-7]\d{8}$/.test(phone.trim());
}
function validateRegisterForm(){
  const name  = document.getElementById("rname")?.value.trim();
  const phone = document.getElementById("rphone")?.value.trim();
  const nid   = document.getElementById("rnid")?.value.trim();
  const zone  = document.getElementById("rzone")?.value;
  const err   = document.getElementById("rerr");
  if(!err) return true;
  const showErr = msg => {
    err.textContent = "⚠️ " + msg;
    err.style.display = "block";
    err.style.animation = "none";
    setTimeout(()=> err.style.animation = "shake .3s ease", 10);
    return false;
  };
  if(!name || name.length < 3)      return showErr("أدخل اسمك الكامل (3 أحرف على الأقل)");
  if(!validatePhone(phone||""))      return showErr("رقم الهاتف غير صحيح — يجب أن يبدأ بـ 05، 06 أو 07 ومكوّن من 10 أرقام");
  if(!nid || nid.length < 9)         return showErr("رقم الهوية الوطنية غير صحيح (9 أرقام على الأقل)");
  if(!zone)                          return showErr("اختر منطقتك");
  err.style.display = "none";
  return true;
}

  msgDiv.style.cssText = "display:flex;flex-direction:column;align-items:flex-start;margin-bottom:9px;";
  msgDiv.innerHTML = `
    <div style="max-width:78%;padding:10px 13px;border-radius:14px 14px 14px 4px;font-size:13px;line-height:1.55;background:linear-gradient(135deg,var(--g),var(--b));color:#fff">${text}</div>
    <div style="font-size:9px;color:#bbb;margin-top:3px">${time}</div>`;
  msgsEl?.appendChild(msgDiv);
  if(inp) inp.value = "";
  if(msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
  if(chatKey) DB.sendMsg(chatKey, {id:Date.now(), senderId, type:"text", text, time:new Date().toISOString()});
  if(onAfterSend) onAfterSend(text);
}
</script>
</body>
</html>
